let allData = [];
let filteredData = [];
let currentMonth = new Date(2026, 1); // Feb 2026
let activeFilters = { audience: [], sequence: [], priority: [] };
let currentView = 'calendar';

// ============================================================
// DATA LOADING
// ============================================================
async function loadData() {
  if (CONFIG.USE_AIRTABLE && CONFIG.AIRTABLE_TOKEN) {
    try {
      const records = await fetchAirtable();
      allData = records;
      updateSyncBadge(true);
    } catch (e) {
      console.warn('Airtable fetch failed, using embedded data:', e);
      allData = EMBEDDED_DATA;
      updateSyncBadge(false);
    }
  } else {
    allData = EMBEDDED_DATA;
    updateSyncBadge(false);
  }
  applyFilters();
  render();
}

async function fetchAirtable() {
  let all = [];
  let offset = null;
  do {
    const url = `https://api.airtable.com/v0/${CONFIG.AIRTABLE_BASE_ID}/${CONFIG.AIRTABLE_TABLE_ID}?pageSize=100` + (offset ? `&offset=${offset}` : '');
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${CONFIG.AIRTABLE_TOKEN}` } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    json.records.forEach(r => all.push(r.fields));
    offset = json.offset;
  } while (offset);
  return all;
}

function updateSyncBadge(connected) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('syncText');
  if (connected) {
    dot.className = 'status-dot connected';
    text.textContent = `Airtable · synced ${new Date().toLocaleTimeString()}`;
  } else {
    dot.className = 'status-dot offline';
    text.textContent = 'Offline mode · embedded data';
  }
}

// ============================================================
// FILTERS
// ============================================================
function buildFilters() {
  const bar = document.getElementById('filtersBar');
  const audiences = [...new Set(allData.map(d => d.Audience))].sort();
  const sequences = ['Pre-Event Engagement', 'Pre-Event Last Mile', 'During Event Week 1', 'During Event Week 2', 'Post Event'];
  const priorities = ['Critical', 'High', 'Medium', 'Low'];

  bar.innerHTML = `
    <div class="filter-group">
      <label>Sequence</label>
      <div class="filter-pills">
        ${sequences.map(s => `<span class="pill" data-filter="sequence" data-value="${s}">${SEQUENCE_EMOJI[s] || ''} ${s.replace('Pre-Event ', '').replace('During Event ', '')}</span>`).join('')}
      </div>
    </div>
    <div class="filter-group">
      <label>Priority</label>
      <div class="filter-pills">
        ${priorities.map(p => `<span class="pill" data-filter="priority" data-value="${p}" style="--pill-color:${PRIORITY_COLORS[p]}">${p}</span>`).join('')}
      </div>
    </div>
    <div class="filter-group">
      <label>Audience</label>
      <div class="filter-pills">
        ${audiences.map(a => {
          const info = getAudienceInfo(a);
          return `<span class="pill" data-filter="audience" data-value="${a}">${info.label}</span>`;
        }).join('')}
      </div>
    </div>
  `;

  bar.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      const type = pill.dataset.filter;
      const value = pill.dataset.value;
      const idx = activeFilters[type].indexOf(value);
      if (idx >= 0) {
        activeFilters[type].splice(idx, 1);
        pill.classList.remove('active');
      } else {
        activeFilters[type].push(value);
        pill.classList.add('active');
      }
      applyFilters();
      render();
    });
  });
}

function applyFilters() {
  filteredData = allData.filter(d => {
    if (activeFilters.audience.length && !activeFilters.audience.includes(d.Audience)) return false;
    if (activeFilters.sequence.length && !activeFilters.sequence.includes(d.Sequence)) return false;
    if (activeFilters.priority.length && !activeFilters.priority.includes(d.Priority)) return false;
    return true;
  });
}

// ============================================================
// KPI
// ============================================================
function renderKPIs() {
  const total = filteredData.length;
  const byStatus = {};
  filteredData.forEach(d => { byStatus[d.Status] = (byStatus[d.Status] || 0) + 1; });
  const critical = filteredData.filter(d => d.Priority === 'Critical').length;
  const high = filteredData.filter(d => d.Priority === 'High').length;

  // Next upcoming
  const today = new Date().toISOString().split('T')[0];
  const upcoming = filteredData
    .filter(d => d.Proposed_Send_Date && d.Proposed_Send_Date !== 'TBD' && d.Proposed_Send_Date >= today)
    .sort((a, b) => a.Proposed_Send_Date.localeCompare(b.Proposed_Send_Date))[0];

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-value gold">${total}</div>
      <div class="kpi-label">Total Emails</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value purple">${byStatus['To Do'] || 0}</div>
      <div class="kpi-label">To Do</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value orange">${byStatus['In Review'] || 0}</div>
      <div class="kpi-label">In Review</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value blue">${byStatus['Confirmed'] || 0}</div>
      <div class="kpi-label">Confirmed</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value" style="color:#c084fc">${byStatus['Scheduled'] || 0}</div>
      <div class="kpi-label">Scheduled</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value green">${byStatus['Sent'] || 0}</div>
      <div class="kpi-label">Sent</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-value red">${critical + high}</div>
      <div class="kpi-label">High Priority</div>
    </div>
    <div class="kpi-card" style="border-top: 2px solid var(--gold)">
      <div class="kpi-value gold" style="font-size:1rem;font-weight:600">${upcoming ? upcoming.Email_Name.substring(0, 25) : '—'}</div>
      <div class="kpi-label">${upcoming ? upcoming.Proposed_Send_Date : 'No upcoming'}</div>
    </div>
  `;
}

// ============================================================
// LEGEND
// ============================================================
function renderLegend() {
  const usedAudiences = [...new Set(filteredData.map(d => d.Audience))];
  document.getElementById('legend').innerHTML = usedAudiences.map(a => {
    const info = getAudienceInfo(a);
    return `<div class="legend-item"><div class="legend-color" style="background:${info.color}"></div>${info.label}</div>`;
  }).join('');
}

// ============================================================
// CALENDAR VIEW
// ============================================================
function renderCalendar() {
  const container = document.getElementById('calendarView');
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  let startDay = firstDay.getDay() - 1;
  if (startDay < 0) startDay = 6;

  // Group emails by date
  const emailsByDate = {};
  filteredData.forEach(d => {
    if (!d.Proposed_Send_Date || d.Proposed_Send_Date === 'TBD') return;
    if (!emailsByDate[d.Proposed_Send_Date]) emailsByDate[d.Proposed_Send_Date] = [];
    emailsByDate[d.Proposed_Send_Date].push(d);
  });

  const todayStr = new Date().toISOString().split('T')[0];

  let html = `
    <div class="month-header">
      <div class="month-nav">
        <button onclick="navMonth(-1)">‹</button>
      </div>
      <div class="month-title">${monthNames[month]} ${year}</div>
      <div class="month-nav">
        <button onclick="navMonth(1)">›</button>
      </div>
    </div>
    <div class="month-grid">
      ${dayNames.map(d => `<div class="day-header">${d}</div>`).join('')}
  `;

  // Empty cells before first day
  for (let i = 0; i < startDay; i++) {
    html += `<div class="day-cell empty"></div>`;
  }

  // Day cells
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const emails = emailsByDate[dateStr] || [];

    html += `<div class="day-cell${isToday ? ' today' : ''}">
      <div class="day-number">${day}</div>
      ${emails.map(e => {
        const info = getAudienceInfo(e.Audience);
        return `<div class="email-chip ${info.class}" onclick='openModal(${JSON.stringify(e.ID).replace(/'/g, "\'")})'
          title="${e.Email_Name}">
          ${e.Email_Name.substring(0, 22)}${e.Email_Name.length > 22 ? '…' : ''}
        </div>`;
      }).join('')}
    </div>`;
  }

  html += `</div>`;
  container.innerHTML = html;
}

function navMonth(delta) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + delta);
  renderCalendar();
}

// ============================================================
// TIMELINE VIEW
// ============================================================
function renderTimeline() {
  const container = document.getElementById('timelineView');

  // Date range: Feb 2026 to Oct 2026
  const startDate = new Date(2026, 1, 1);
  const endDate = new Date(2026, 9, 1);
  const totalDays = (endDate - startDate) / (1000 * 60 * 60 * 24);

  const monthNames = ['Feb','Mar','Apr','May','Jun','Jul','Aug','Sep'];
  const todayStr = new Date().toISOString().split('T')[0];
  const todayDate = new Date();
  const todayOffset = (todayDate - startDate) / (1000 * 60 * 60 * 24);
  const todayPct = Math.max(0, Math.min(100, (todayOffset / totalDays) * 100));

  // Group by audience
  const groups = {};
  filteredData.forEach(d => {
    if (!d.Proposed_Send_Date || d.Proposed_Send_Date === 'TBD') return;
    if (!groups[d.Audience]) groups[d.Audience] = [];
    groups[d.Audience].push(d);
  });

  // Month labels
  let monthsHtml = '<div class="timeline-months">';
  for (let m = 1; m <= 8; m++) {
    const mStart = new Date(2026, m, 1);
    const mEnd = new Date(2026, m + 1, 0);
    const left = ((mStart - startDate) / (1000 * 60 * 60 * 24) / totalDays) * 100;
    const width = ((mEnd - mStart) / (1000 * 60 * 60 * 24) / totalDays) * 100;
    monthsHtml += `<div class="timeline-month-label" style="width:${width}%;text-align:center">${monthNames[m-1]}</div>`;
  }
  monthsHtml += '</div>';

  // Event period highlight
  const eventStart = new Date(2026, 6, 20);
  const eventEnd = new Date(2026, 7, 2);
  const evLeft = ((eventStart - startDate) / (1000 * 60 * 60 * 24) / totalDays) * 100;
  const evWidth = ((eventEnd - eventStart) / (1000 * 60 * 60 * 24) / totalDays) * 100;

  let html = monthsHtml;

  const sortedGroups = Object.keys(groups).sort((a, b) => {
    const aFirst = groups[a].sort((x, y) => x.Proposed_Send_Date.localeCompare(y.Proposed_Send_Date))[0];
    const bFirst = groups[b].sort((x, y) => x.Proposed_Send_Date.localeCompare(y.Proposed_Send_Date))[0];
    return aFirst.Proposed_Send_Date.localeCompare(bFirst.Proposed_Send_Date);
  });

  for (const audience of sortedGroups) {
    const info = getAudienceInfo(audience);
    const emails = groups[audience];

    html += `<div class="swimlane">
      <div class="swimlane-label">
        <span class="swimlane-dot" style="background:${info.color}"></span>
        ${info.label}
        <span style="color:var(--text-muted);font-weight:400;font-size:0.7rem">(${emails.length})</span>
      </div>
      <div class="swimlane-track" style="position:relative">
        <div style="position:absolute;left:${evLeft}%;width:${evWidth}%;top:0;bottom:0;background:rgba(212,168,67,0.06);border-radius:4px;"></div>
        ${todayPct > 0 && todayPct < 100 ? `<div class="today-marker" style="left:${todayPct}%"></div>` : ''}
        ${emails.map(e => {
          const eDate = new Date(e.Proposed_Send_Date + 'T00:00:00');
          const left = ((eDate - startDate) / (1000 * 60 * 60 * 24) / totalDays) * 100;
          return `<div class="timeline-block ${info.class}" style="left:${left}%;min-width:80px;"
            onclick='openModal("${e.ID}")'
            title="${e.Email_Name} — ${e.Proposed_Send_Date}">
            ${e.Email_Name.substring(0, 18)}${e.Email_Name.length > 18 ? '…' : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

// ============================================================
// MODAL
// ============================================================
function openModal(id) {
  const email = allData.find(d => d.ID === id || d.ID === String(id));
  if (!email) return;

  const info = getAudienceInfo(email.Audience);

  document.getElementById('modalTitle').textContent = email.Email_Name;
  document.getElementById('modalSubject').textContent = `📧 ${email.Subject_Line}`;

  document.getElementById('modalMeta').innerHTML = `
    <span class="meta-tag" style="border-color:${info.color};color:${info.color};background:${info.color}15">${email.Audience}</span>
    <span class="meta-tag" style="border-color:var(--purple);color:var(--purple-light);background:rgba(124,58,237,0.1)">${email.Sequence}</span>
    <span class="meta-tag" style="border-color:${PRIORITY_COLORS[email.Priority]};color:${PRIORITY_COLORS[email.Priority]};background:transparent">${email.Priority}</span>
    <span class="meta-tag" style="border-color:var(--card-border);color:var(--text-dim);background:transparent">📅 ${email.Proposed_Send_Date} (${email.Day_of_Week})</span>
    <span class="meta-tag" style="border-color:var(--card-border);color:var(--text-dim);background:transparent">🔔 Notify: ${email.Prep_Notification_Date || '—'}</span>
    <span class="meta-tag" style="border-color:var(--card-border);color:var(--text-dim);background:transparent">Status: ${email.Status}</span>
  `;

  let bodyHtml = '';

  if (email.CTA_Description) {
    bodyHtml += `
      <div class="modal-section">
        <div class="modal-section-title">CTA</div>
        <div style="color:var(--text-dim);font-size:0.85rem">${email.CTA_Type}: ${email.CTA_Description}</div>
      </div>`;
  }

  if (email.Notes) {
    bodyHtml += `
      <div class="modal-section">
        <div class="modal-section-title">Notes</div>
        <div style="color:var(--text-dim);font-size:0.85rem">${email.Notes}</div>
      </div>`;
  }

  if (email.Copy_2026) {
    bodyHtml += `
      <div class="modal-section">
        <div class="modal-section-title">Copy 2026 (Proposed)</div>
        <div class="copy-block">${escapeHtml(email.Copy_2026)}</div>
      </div>`;
  }

  if (email.Reference_2025_Copy) {
    bodyHtml += `
      <div class="modal-section">
        <div class="modal-section-title">Reference 2025</div>
        <div class="ref-block">${escapeHtml(email.Reference_2025_Copy)}</div>
      </div>`;
  }

  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
// VIEW TOGGLE
// ============================================================
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.getElementById('calendarView').classList.toggle('active', currentView === 'calendar');
    document.getElementById('timelineView').classList.toggle('active', currentView === 'timeline');
    if (currentView === 'timeline') renderTimeline();
  });
});

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// Close on ESC
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// ============================================================
// RENDER
// ============================================================
function render() {
  renderKPIs();
  renderLegend();
  renderCalendar();
  if (currentView === 'timeline') renderTimeline();
}

// ============================================================
// INIT
// ============================================================
loadData().then(() => {
  buildFilters();

  // Auto-refresh if Airtable is active
  if (CONFIG.USE_AIRTABLE && CONFIG.AIRTABLE_TOKEN) {
    setInterval(loadData, CONFIG.REFRESH_INTERVAL);
  }
});
</script>
</body>
</html>
