name: Update Dashboards

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate MVU 2026 dashboard
        env:
          BIZZABO_CLIENT_ID:     ${{ secrets.BIZZABO_CLIENT_ID }}
          BIZZABO_CLIENT_SECRET: ${{ secrets.BIZZABO_CLIENT_SECRET }}
          BIZZABO_ACCOUNT_ID:    "129966"
          BIZZABO_EVENT_ID:      "754649"
        run: python generate.py

      - name: Copy shell as index.html
        run: cp index.html.shell index.html

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update dashboards $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
